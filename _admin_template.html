<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MP Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>/* __SERVER_PAYLOAD__ */</script>

    <script type="module">
        import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, setDoc, updateDoc, collection, addDoc, query, orderBy, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

            const firebaseConfig = {
              apiKey: "AIzaSyB5cfzF0ZtshRecPwGPigbVFEkMuGbD0kw",
              authDomain: "mp-website-4de23.firebaseapp.com",
              projectId: "mp-website-4de23",
              storageBucket: "mp-website-4de23.firebasestorage.app",
              messagingSenderId: "985076640347",
              appId: "1:985076640347:web:9170a73ecb4aa8d656ad7e"
};

        const app  = initializeApp(firebaseConfig);
        const db   = getFirestore(app);
        const auth = getAuth(app);
        window.firebaseDb          = db;
        window.firebaseAuth        = auth;
        window.firebaseOnSnapshot  = onSnapshot;
        window.firebaseDoc         = doc;
        window.firebaseGetDoc      = getDoc;
        window.firebaseSetDoc      = setDoc;
        window.firebaseUpdateDoc   = updateDoc;
        window.firebaseCollection  = collection;
        window.firebaseAddDoc      = addDoc;
        window.firebaseSignIn      = signInWithCustomToken;
        window.firebaseQuery       = query;
        window.firebaseOrderBy     = orderBy;
        window.firebaseGetDocs     = getDocs;
        window.firebaseDeleteDoc   = deleteDoc;
    </script>

    <style>
        body { background:#09090b; color:#e4e4e7; min-height:100vh; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
        .admin-scroll::-webkit-scrollbar{width:6px} .admin-scroll::-webkit-scrollbar-track{background:transparent} .admin-scroll::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:6px} .admin-scroll::-webkit-scrollbar-thumb:hover{background:#52525b}
        #toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:400px;}
        .toast{background:rgba(15,23,42,.95);backdrop-filter:blur(8px);color:white;padding:12px 20px;border-radius:99px;font-size:13px;font-weight:600;box-shadow:0 10px 25px rgba(0,0,0,.2);animation:slideUpFade .3s ease forwards,fadeOut .3s ease 2.7s forwards;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.1);width:100%;justify-content:center;}
        .toast-error{border-color:rgba(239,68,68,.5);color:#fca5a5} .toast-success{border-color:rgba(16,185,129,.5);color:#6ee7b7} .toast-info{border-color:rgba(59,130,246,.5);color:#93c5fd}
        @keyframes slideUpFade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}} @keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
        .rubric-btn{border:1px solid #3f3f46;border-radius:8px;width:36px;height:36px;font-weight:700;font-size:13px;transition:all .2s;cursor:pointer;background:#18181b;color:#a1a1aa}
        .rubric-btn:hover{border-color:#71717a;background:#27272a;color:white}
        .rubric-btn.selected-0{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
        .rubric-btn.selected-1{background:rgba(249,115,22,.15);border-color:#f97316;color:#fdba74}
        .rubric-btn.selected-2{background:rgba(234,179,8,.15);border-color:#eab308;color:#fde047}
        .rubric-btn.selected-3{background:rgba(34,197,94,.15);border-color:#22c55e;color:#86efac}
        .rubric-btn.selected-4{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#93c5fd}
        .rubric-btn.selected-5{background:rgba(168,85,247,.15);border-color:#a855f7;color:#d8b4fe}
        .q-inline-edit{border:none;background:transparent;outline:none;width:100%;font-size:.875rem;color:#e4e4e7;resize:none;line-height:1.5}
        .q-inline-edit:focus{background:#27272a;border-radius:6px;padding:4px 6px;box-shadow:0 0 0 2px #3b82f6}
        .drag-handle{cursor:grab;color:#52525b} .drag-handle:active{cursor:grabbing}
        .q-row.dragging{opacity:.4} .q-row.drag-over{border-top:2px solid #3b82f6}
        #auth-gate{position:fixed;inset:0;background:#09090b;display:flex;align-items:center;justify-content:center;z-index:9999}
        #main-panel{display:none} #main-panel.visible{display:flex}
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-gate">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-zinc-700 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p id="auth-gate-msg" class="text-zinc-400 text-sm">Verifying secure credentials...</p>
        </div>
    </div>

    <div id="main-panel" class="fixed inset-0 flex flex-col font-sans" style="background:#09090b;">
        <!-- Topbar -->
        <div class="h-14 flex items-center justify-between px-6 bg-[#18181b] border-b border-[#27272a] flex-shrink-0">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-shield-halved text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-sm tracking-wide">MP Command Center</h1>
                    <p class="text-[#a1a1aa] text-[10px] uppercase tracking-widest">Military Police Secure Terminal</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1 rounded bg-[#09090b] border border-[#27272a]">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span class="text-xs font-semibold text-blue-400" id="cc-admin-badge">Examiner</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-1 rounded bg-[#09090b] border border-[#27272a]">
                    <i class="fa-solid fa-shield-check text-blue-500 text-xs"></i>
                    <span class="text-xs text-[#a1a1aa]" id="session-timer">2h</span>
                </div>
                <button onclick="secureLogout()" class="w-8 h-8 rounded flex items-center justify-center text-[#a1a1aa] hover:text-white hover:bg-[#27272a] transition-colors" title="Logout">
                    <i class="fa-solid fa-right-from-bracket text-sm"></i>
                </button>
            </div>
        </div>
        <!-- Body -->
        <div class="flex flex-1 min-h-0">
            <div class="w-16 sm:w-64 flex-shrink-0 flex flex-col border-r border-[#27272a] bg-[#18181b]/50">
                <div id="cc-sidebar-nav" class="flex flex-col p-3 gap-1 overflow-y-auto admin-scroll h-full"></div>
            </div>
            <div id="admin-dynamic-content" class="flex-1 min-w-0 flex flex-col relative overflow-hidden bg-[#09090b]"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- PDF TEMPLATE -->
    <div id="pdf-export-template" class="hidden" style="width:794px;background:white;color:#111;font-family:'Inter',Arial,sans-serif;font-size:13px;line-height:1.6;padding:48px 56px;box-sizing:border-box;">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #111;padding-bottom:14px;margin-bottom:24px;">
            <div>
                <div id="pdf-main-title" style="font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:-0.5px;line-height:1.1;">Official Record</div>
                <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px;color:#555;">Military Police Examination</div>
            </div>
            <div style="text-align:right;">
                <div id="pdf-header-date" style="font-size:11px;font-weight:600;"></div>
                <div style="font-size:10px;color:#666;margin-top:2px;">ID: <span id="pdf-header-id"></span></div>
            </div>
        </div>
        <div id="pdf-exam-wrapper" style="display:none;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:20px;">
                <div style="font-size:12px;"><span style="font-weight:700;">CANDIDATE:</span> <span id="pdf-candidate-name"></span></div>
                <div style="font-size:12px;"><span style="font-weight:700;">DISCORD:</span> <span id="pdf-candidate-discord"></span></div>
                <div style="font-size:12px;"><span style="font-weight:700;">EVALUATOR:</span> <span id="pdf-exam-evaluator"></span></div>
                <div style="font-size:12px;"><span style="font-weight:700;">TIME TAKEN:</span> <span id="pdf-exam-time"></span></div>
                <div style="font-size:12px;"><span style="font-weight:700;">SECURITY FLAGS:</span> <span id="pdf-exam-flags"></span></div>
            </div>
            <div id="pdf-result-box" style="border:2px solid #111;padding:16px;text-align:center;margin-bottom:24px;">
                <div id="pdf-exam-status" style="font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:3px;"></div>
                <div style="font-size:14px;font-weight:700;margin-top:4px;">FINAL SCORE: <span id="pdf-exam-score"></span></div>
            </div>
            <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #111;padding-bottom:6px;margin-bottom:16px;">Exam Transcript</div>
            <div id="pdf-qa-list"></div>
        </div>
        <div style="margin-top:32px;padding-top:10px;border-top:1px solid #111;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;">End of Official Document</div>
    </div>

    <script>
    // ── GLOBAL STATE ──────────────────────────────────────────────────────────
    let appState = {
        robloxName: null, robloxId: null,
        isAdmin: false, isHighCommand: false,
        isGuest: false, grantAccess: null,
        tokenExp: null
    };

    let QUESTION_BANK = [], CATEGORIES = [];
    let expandedAdminSections = new Set();
    let adminSubmissions = [], currentDossier = null, adminCurrentView = 'evaluate_list';
    let allCodesData = [], allHistoryData = [], histCurrentFilter = 'all';
    let allAccessGrants = [];
    let jrahDragSrcIndex = null, jrahDragSrcCat = null;
    let unsubscribeCCTV = null;

    // ── BOOT ──────────────────────────────────────────────────────────────────
    async function boot() {
        const p = window.__SERVER_PAYLOAD__;

        if (!p || (!p.isAdmin && !p.isGuest)) {
            showGateError('Unauthorized. Redirecting...');
            setTimeout(() => window.location.href = '/', 1500);
            return;
        }

        appState.robloxName    = p.roblox;
        appState.robloxId      = p.id;
        appState.isAdmin       = p.isAdmin       || false;
        appState.isHighCommand = p.isHighCommand || false;
        appState.isGuest       = p.isGuest       || false;
        appState.grantAccess   = p.grantAccess   || null;
        appState.tokenExp      = p.exp;

        if (p.firebaseToken && window.firebaseSignIn) {
            try { await window.firebaseSignIn(window.firebaseAuth, p.firebaseToken); } catch(e) { console.warn('Firebase auth:', e); }
        }

        if (!appState.isGuest) {
            await loadQuestionBankFromCloud();
        }

        startSessionTimer();
        showAdminPanel();
    }

    function showGateError(msg) {
        document.getElementById('auth-gate-msg').textContent = msg;
        document.getElementById('auth-gate-msg').style.color = '#fca5a5';
    }

    function showAdminPanel() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-panel').classList.add('visible');

        const badge = document.getElementById('cc-admin-badge');
        if (badge) badge.textContent = appState.isGuest ? 'Guest Access' : (appState.isHighCommand ? 'MP COM' : 'MP CPT');

        // Default view based on access
        if (appState.isGuest) {
            const g = appState.grantAccess || {};
            if (g.evals)      adminCurrentView = 'evaluate_list';
            else if (g.db)    adminCurrentView = 'db';
            else if (g.history) adminCurrentView = 'interview_history';
        } else {
            adminCurrentView = 'evaluate_list';
        }

        renderAdminUI();
        if (!appState.isGuest) adminLoadSubmissions();
        else if (appState.grantAccess?.evals) adminLoadSubmissions();
    }

    function startSessionTimer() {
        if (!appState.tokenExp) return;
        const el = document.getElementById('session-timer');
        setInterval(() => {
            const remaining = appState.tokenExp - Math.floor(Date.now() / 1000);
            if (remaining <= 0) { el.textContent = 'Expired'; el.style.color = '#fca5a5'; setTimeout(secureLogout, 1500); return; }
            const m = Math.floor(remaining / 60), s = String(remaining % 60).padStart(2, '0');
            el.textContent = `${m}:${s}`;
            if (remaining < 300) el.style.color = '#fde047';
        }, 1000);
    }

    function secureLogout() { window.location.href = '/api/admin-logout'; }

    // ── CLOUD DB ──────────────────────────────────────────────────────────────
    async function loadQuestionBankFromCloud() {
        try {
            const docRef  = window.firebaseDoc(window.firebaseDb, "mp_admin_data", "question_bank");
            const docSnap = await window.firebaseGetDoc(docRef);
            if (docSnap.exists()) {
                QUESTION_BANK = docSnap.data().questions  || [];
                CATEGORIES    = docSnap.data().categories || [];
            } else {
                QUESTION_BANK = []; CATEGORIES = [];
                await window.firebaseSetDoc(docRef, { questions: QUESTION_BANK, categories: CATEGORIES });
            }
        } catch(e) { console.error("Error loading MP question bank:", e); }
    }

    async function saveDBToCloud() {
        try {
            await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "mp_admin_data", "question_bank"), { questions: QUESTION_BANK, categories: CATEGORIES }, { merge: true });
            showToast("Cloud Database Updated.", "success");
        } catch(e) { showToast("Error communicating with Cloud.", "error"); }
    }

    // ── TOAST ─────────────────────────────────────────────────────────────────
    function showToast(message, type = 'error') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        const icon = type === 'error' ? '<i class="fa-solid fa-shield-halved"></i>' : type === 'info' ? '<i class="fa-solid fa-circle-info"></i>' : '<i class="fa-solid fa-check"></i>';
        toast.innerHTML = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 3000);
    }

    // ── NAV ───────────────────────────────────────────────────────────────────
    const CC_NAV = [
        { id: 'settings',          icon: 'fa-toggle-on',           label: 'Portal Control',  color: '#10b981', hcOnly: true,  cat: 'System Management', guestOk: false },
        { id: 'db',                icon: 'fa-database',            label: 'Database',         color: '#3b82f6', hcOnly: false, cat: 'System Management', guestOk: true  },
        { id: 'jrah',              icon: 'fa-pen-to-square',       label: 'Bank Editor',      color: '#8b5cf6', hcOnly: true,  cat: 'System Management', guestOk: false },
        { id: 'codes_history',     icon: 'fa-key',                 label: 'Access Codes',     color: '#06b6d4', hcOnly: false, cat: 'System Management', guestOk: false },
        { id: 'access_grants',     icon: 'fa-user-shield',         label: 'Access Grants',    color: '#f59e0b', hcOnly: true,  cat: 'System Management', guestOk: false },
        { id: 'generate',          icon: 'fa-wand-magic-sparkles', label: 'Create Test',      color: '#f59e0b', hcOnly: false, cat: 'MP Interviews',     guestOk: false },
        { id: 'evaluate_list',     icon: 'fa-file-signature',      label: 'Pending Evals',    color: '#10b981', hcOnly: false, cat: 'MP Interviews',     guestOk: true  },
        { id: 'interview_history', icon: 'fa-clock-rotate-left',   label: 'History',          color: '#f43f5e', hcOnly: false, cat: 'MP Interviews',     guestOk: true  },
    ];

    function switchAdminView(viewName) {
        // Guest: only allowed views based on grant
        if (appState.isGuest) {
            const g = appState.grantAccess || {};
            const allowed = [];
            if (g.db)      allowed.push('db');
            if (g.evals)   allowed.push('evaluate_list', 'dossier_view');
            if (g.history) allowed.push('interview_history');
            if (!allowed.includes(viewName)) { showToast('Access not granted.', 'error'); return; }
        }
        const navItem = CC_NAV.find(n => n.id === viewName);
        if (navItem?.hcOnly && !appState.isHighCommand && !appState.isGuest) { showToast('MP COM required.', 'error'); return; }
        adminCurrentView = viewName;
        renderAdminUI();
    }

    function toggleAdminSection(secName) {
        if (expandedAdminSections.has(secName)) expandedAdminSections.delete(secName);
        else expandedAdminSections.add(secName);
        renderAdminUI();
    }

    // ── RENDER UI ─────────────────────────────────────────────────────────────
    function renderAdminUI() {
        const nav = document.getElementById('cc-sidebar-nav');
        if (nav) {
            let visible;
            if (appState.isGuest) {
                const g = appState.grantAccess || {};
                visible = CC_NAV.filter(item => {
                    if (item.id === 'db'                && g.db)      return true;
                    if (item.id === 'evaluate_list'     && g.evals)   return true;
                    if (item.id === 'interview_history' && g.history) return true;
                    return false;
                });
            } else {
                visible = CC_NAV.filter(item => !item.hcOnly || appState.isHighCommand);
            }

            let currentCat = '';
            nav.innerHTML = visible.map(item => {
                const isActive = adminCurrentView === item.id || (item.id === 'evaluate_list' && adminCurrentView === 'dossier_view');
                const activeClass = isActive ? `bg-[#27272a] text-white border-l-2` : `text-[#a1a1aa] hover:bg-[#27272a]/50 hover:text-white border-l-2 border-transparent`;
                let catHeader = '';
                if (item.cat !== currentCat) {
                    currentCat = item.cat;
                    catHeader = `<div class="mt-4 mb-1 px-3"><p class="text-[10px] font-bold text-[#52525b] uppercase tracking-widest">${currentCat}</p></div>`;
                }
                return catHeader + `<button onclick="switchAdminView('${item.id}')" class="flex flex-col sm:flex-row items-center sm:items-center gap-1 sm:gap-3 px-2 sm:px-3 py-3 sm:py-2.5 rounded transition-all ${activeClass}" style="${isActive ? `border-color:${item.color};` : ''}">
                    <i class="fa-solid ${item.icon} text-lg sm:text-sm" style="${isActive ? `color:${item.color};` : ''}"></i>
                    <span class="text-[10px] sm:text-sm font-medium w-full sm:w-auto text-center sm:text-left truncate">${item.label}</span>
                </button>`;
            }).join('');

            // Guest banner
            if (appState.isGuest) {
                nav.innerHTML = `<div class="mx-2 mt-3 mb-2 p-2 rounded-lg bg-amber-500/10 border border-amber-500/20">
                    <p class="text-[10px] font-bold text-amber-400 text-center">Guest Access</p>
                    <p class="text-[9px] text-[#a1a1aa] text-center mt-0.5">Limited view only</p>
                </div>` + nav.innerHTML;
            }
        }

        const container = document.getElementById('admin-dynamic-content');
        if (!container) return;

        function renderHeader(icon, color, title, desc) {
            return `<div class="px-6 py-5 border-b border-[#27272a] bg-[#18181b]/30 flex items-center flex-shrink-0">
                <div><h2 class="text-xl font-bold text-white flex items-center gap-3"><i class="fa-solid ${icon}" style="color:${color}"></i> ${title}</h2>${desc ? `<p class="text-xs text-[#a1a1aa] mt-1 ml-8">${desc}</p>` : ''}</div></div>`;
        }

        // ── VIEWS ─────────────────────────────────────────────────────────────
        if (adminCurrentView === 'settings') {
            container.innerHTML = `${renderHeader('fa-toggle-on','#10b981','Portal Control','Manage MP examination portal access')}
            <div class="flex-1 overflow-y-auto admin-scroll p-6 flex justify-center items-start">
                <div class="max-w-xl w-full">
                    <div class="bg-[#18181b] border border-[#27272a] rounded-xl p-6">
                        <h3 class="text-sm font-bold text-white border-b border-[#27272a] pb-3 mb-4">Portal Access Protocol</h3>
                        <div class="flex items-center justify-between p-4 bg-[#09090b] border border-[#27272a] rounded-lg">
                            <div><h4 class="text-white font-bold mb-1">Examination Portal Status</h4><p class="text-xs text-[#a1a1aa]">Toggle candidate access to the testing system.</p></div>
                            <button id="portal-toggle-btn" onclick="togglePortalStatus()" class="px-4 py-2 rounded font-bold text-xs"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</button>
                        </div>
                    </div>
                </div>
            </div>`;
            loadPortalStatus();

        } else if (adminCurrentView === 'db') {
            renderDBView(container, renderHeader);

        } else if (adminCurrentView === 'jrah') {
            renderJrahView(container, renderHeader);

        } else if (adminCurrentView === 'generate') {
            container.innerHTML = `${renderHeader('fa-wand-magic-sparkles','#f59e0b','Generate Test','Create a randomized exam for a candidate')}
            <div class="flex-1 overflow-y-auto admin-scroll p-6 flex justify-center">
                <div class="max-w-xl w-full">
                    <div class="bg-[#18181b] border border-[#27272a] rounded-xl p-6 mb-6">
                        <h3 class="text-sm font-bold text-white border-b border-[#27272a] pb-3 mb-4">Candidate Information</h3>
                        <div class="space-y-4">
                            <div><label class="block text-xs font-semibold text-[#a1a1aa] uppercase mb-1.5">Discord User <span class="text-red-500">*</span></label>
                                <div class="relative"><i class="fa-brands fa-discord absolute left-3 top-3 text-[#a1a1aa]"></i>
                                <input type="text" id="admin-discord" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg pl-9 pr-4 py-2.5 text-sm text-white focus:border-amber-500 outline-none" placeholder="e.g. user#1234"></div></div>
                            <div><label class="block text-xs font-semibold text-[#a1a1aa] uppercase mb-1.5">Roblox User <span class="text-red-500">*</span></label>
                                <div class="relative"><i class="fa-solid fa-gamepad absolute left-3 top-3 text-[#a1a1aa]"></i>
                                <input type="text" id="admin-roblox" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg pl-9 pr-4 py-2.5 text-sm text-white focus:border-amber-500 outline-none" placeholder="e.g. ProGamer123">
                                <p class="text-[10px] text-[#a1a1aa] mt-1 italic">Code binds strictly to this username.</p></div></div>
                            <div><label class="block text-xs font-semibold text-[#a1a1aa] uppercase mb-1.5">Roblox ID (Optional)</label>

        document.getElementById('grant-modal').classList.remove('hidden');
        document.getElementById('grant-modal').classList.add('flex');
    }
    function closeGrantModal() {
        document.getElementById('grant-modal').classList.add('hidden');
        document.getElementById('grant-modal').classList.remove('flex');
        document.getElementById('grant-roblox').value  = '';
        document.getElementById('grant-db').checked    = false;
        document.getElementById('grant-evals').checked = false;
        document.getElementById('grant-history').checked = false;
        document.getElementById('grant-expiry').value  = '';
    }

    async function loadAccessGrants() {
        try {
            const snap = await window.firebaseGetDocs(window.firebaseCollection(window.firebaseDb, "mp_access_grants"));
            allAccessGrants = [];
            snap.forEach(doc => allAccessGrants.push({ id: doc.id, ...doc.data() }));
            allAccessGrants.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            renderAccessGrants();
        } catch(e) {
            console.error("Load grants error:", e);
        }
    }

    function renderAccessGrants() {
        const el = document.getElementById('grants-list');
        if (!el) return;

        if (!allAccessGrants.length) {
            el.innerHTML = `<div class="text-center py-16 text-[#a1a1aa] border border-dashed border-[#27272a] rounded-xl">
                <i class="fa-solid fa-user-shield text-3xl mb-3 block opacity-20"></i>
                <p>No access grants found. Add one to allow guest access.</p>
            </div>`;
            return;
        }

        el.innerHTML = allAccessGrants.map(grant => {
            const now     = new Date();
            const expired = grant.expiresAt && new Date(grant.expiresAt) < now;
            const access  = grant.access || {};
            const badges  = [
                access.db      ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20">DB</span>`     : '',
                access.evals   ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-green-500/10 text-green-400 border border-green-500/20">EVALS</span>` : '',
                access.history ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-violet-500/10 text-violet-400 border border-violet-500/20">HISTORY</span>` : '',
            ].filter(Boolean).join(' ');
            const statusColor = expired ? 'text-red-400 bg-red-500/10 border-red-500/20' : 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
            const statusText  = expired ? 'Expired' : 'Active';

            return `<div class="bg-[#18181b] border border-[#27272a] rounded-xl p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-amber-500/10 border border-amber-500/20 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-user text-amber-400 text-sm"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-white">${grant.roblox}</span>
                            <span class="text-[9px] uppercase font-bold px-1.5 py-0.5 rounded border ${statusColor}">${statusText}</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-1.5 mb-1">${badges || '<span class="text-[10px] text-[#a1a1aa]">No permissions</span>'}</div>
                        <div class="text-[10px] text-[#52525b]">
                            Added by <span class="text-[#a1a1aa]">${grant.grantedBy || 'Unknown'}</span>
                            ${grant.expiresAt ? ` • Expires: <span class="${expired ? 'text-red-400' : 'text-[#a1a1aa]'}">${new Date(grant.expiresAt).toLocaleDateString()}</span>` : ' • No expiry'}
                        </div>
                    </div>
                </div>
                <button onclick="deleteAccessGrant('${grant.id}')" class="text-[10px] font-bold px-3 py-2 rounded shrink-0" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);">
                    <i class="fa-solid fa-trash-can mr-1"></i> Revoke
                </button>
            </div>`;
        }).join('');
    }

    async function submitAccessGrant() {
        const roblox   = document.getElementById('grant-roblox').value.trim();
        const db       = document.getElementById('grant-db').checked;
        const evals    = document.getElementById('grant-evals').checked;
        const history  = document.getElementById('grant-history').checked;
        const expiryVal = document.getElementById('grant-expiry').value;

        if (!roblox)                   { showToast("Roblox username is required.", "error"); return; }
        if (!db && !evals && !history) { showToast("Select at least one permission.", "error"); return; }

        const btn  = document.querySelector('#grant-modal button[onclick="submitAccessGrant()"]');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Saving...';
        btn.classList.add('opacity-50', 'pointer-events-none');

        try {
            await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "mp_access_grants"), {
                roblox,
                grantedBy:  appState.robloxName || 'Unknown',
                access:     { db, evals, history },
                expiresAt:  expiryVal ? new Date(expiryVal).toISOString() : null,
                createdAt:  new Date().toISOString()
            });
            showToast("Access grant created.", "success");
            closeGrantModal();
            loadAccessGrants();
        } catch(e) {
            console.error("Grant error:", e);
            showToast("Error creating grant.", "error");
        } finally {
            btn.innerHTML = orig;
            btn.classList.remove('opacity-50', 'pointer-events-none');
        }
    }

    async function deleteAccessGrant(id) {
        if (!confirm('Revoke this access grant? The user will no longer be able to log in.')) return;
        try {
            await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "mp_access_grants", id));
            showToast("Grant revoked.", "success");
            allAccessGrants = allAccessGrants.filter(g => g.id !== id);
            renderAccessGrants();
        } catch(e) {
            console.error(e);
            showToast(e.code === 'permission-denied' ? 'Permission denied.' : 'Error revoking.', 'error');
        }
    }

    // ── RUBRIC ────────────────────────────────────────────────────────────────
    function rubricSelect(qIndex, value) {
        document.querySelectorAll('.q-score').forEach(inp => { if (parseInt(inp.dataset.q) === qIndex) inp.value = value; });
        document.querySelectorAll(`[data-q="${qIndex}"]`).forEach(btn => {
            if (btn.tagName === 'BUTTON') { btn.className = 'rubric-btn'; if (parseInt(btn.dataset.val) === value) btn.classList.add(`selected-${value}`); }
        });
        const labels = ['No answer','Very poor','Partial','Acceptable','Good','Perfect'];
        const label  = document.getElementById(`rubric-label-${qIndex}`);
        if (label) { label.textContent = `${value}/5 — ${labels[value]}`; label.className = 'text-white text-xs font-medium'; }
        calculateTotalScore();
    }

    function calculateTotalScore() {
        let total = 0;
        document.querySelectorAll('.q-score').forEach(inp => { let v = parseInt(inp.value); if (isNaN(v)) v = 0; total += v; });
        if (!currentDossier) return;
        const maxPts = currentDossier.qaList.length * 5;
        const pct    = maxPts > 0 ? (total / maxPts) * 100 : 0;
        const scoreEl = document.getElementById('live-total-score');
        if (!scoreEl) return;
        scoreEl.innerText = total;
        document.getElementById('score-progress').style.width = `${Math.min(pct, 100)}%`;
        const statusEl = document.getElementById('live-status');
        if (pct >= 70) { statusEl.innerText = `ADMITTED (${pct.toFixed(0)}%)`; statusEl.className = 'text-emerald-500'; document.getElementById('score-progress').className = 'h-full bg-emerald-500 transition-all'; }
        else           { statusEl.innerText = `REJECTED (${pct.toFixed(0)}%)`; statusEl.className = 'text-red-500';     document.getElementById('score-progress').className = 'h-full bg-red-500 transition-all'; }
        const breakdown = document.getElementById('score-breakdown');
        if (breakdown && currentDossier) {
            let catScores = {}, catMax = {};
            currentDossier.qaList.forEach((qa, i) => {
                const cat = qa.category || 'General';
                if (!catScores[cat]) { catScores[cat] = 0; catMax[cat] = 0; }
                const inp = [...document.querySelectorAll('.q-score')].find(el => parseInt(el.dataset.q) === i);
                catScores[cat] += inp ? parseInt(inp.value || 0) : 0; catMax[cat] += 5;
            });
            breakdown.innerHTML = Object.keys(catScores).map(cat => {
                const p = catMax[cat] > 0 ? Math.round((catScores[cat] / catMax[cat]) * 100) : 0;
                const c = p >= 70 ? 'bg-emerald-500' : p >= 40 ? 'bg-amber-500' : 'bg-red-500';
                return `<div class="flex items-center justify-between gap-3 py-1.5">
                    <span class="text-[#a1a1aa] text-[10px] font-semibold uppercase truncate flex-1">${cat}</span>
                    <div class="w-16 bg-[#09090b] rounded-full h-1.5 flex-shrink-0 border border-[#27272a] overflow-hidden"><div class="${c} h-full rounded-full" style="width:${p}%"></div></div>
                    <span class="font-mono text-white text-xs w-8 text-right">${catScores[cat]}/${catMax[cat]}</span>
                </div>`;
            }).join('');
        }
    }

    // ── DB CRUD ───────────────────────────────────────────────────────────────
    async function adminAddSection() {
        const input = document.getElementById('new-section-name'); const val = input.value.trim();
        if (!val) { alert("Enter a name."); return; } if (CATEGORIES.includes(val)) { alert("Already exists."); return; }
        CATEGORIES.push(val); expandedAdminSections.add(val); input.value = ''; renderAdminUI(); await saveDBToCloud();
    }
    async function adminDeleteSection(secName) {
        if (!confirm(`Delete "${secName}" and ALL its questions?`)) return;
        CATEGORIES = CATEGORIES.filter(c => c !== secName); QUESTION_BANK = QUESTION_BANK.filter(q => q.cat !== secName);
        expandedAdminSections.delete(secName); renderAdminUI(); await saveDBToCloud();
    }
    async function adminAddQuestion() {
        const cat = document.getElementById('new-question-section').value; const qText = document.getElementById('new-question-text').value.trim();
        if (!cat) { alert("Select a section."); return; } if (!qText) { alert("Enter question text."); return; }
        QUESTION_BANK.push({ cat, q: qText }); expandedAdminSections.add(cat); document.getElementById('new-question-text').value = ''; renderAdminUI(); await saveDBToCloud();
    }
    async function adminDeleteQuestion(idx) {
        if (!confirm("Delete this question?")) return; QUESTION_BANK.splice(idx, 1); renderAdminUI(); await saveDBToCloud();
    }

    // ── GENERATE ──────────────────────────────────────────────────────────────
    async function generateAutoInterview() {
        const discord = document.getElementById('admin-discord').value.trim();
        const roblox  = document.getElementById('admin-roblox').value.trim();
        const rbxId   = document.getElementById('admin-roblox-id').value.trim();
        if (!discord || !roblox) { alert("Provide Discord and Roblox usernames."); return; }
        if (QUESTION_BANK.length === 0) { alert("Database is empty."); return; }
        let selected = [];
        const target = 20, validCats = CATEGORIES.filter(c => QUESTION_BANK.some(q => q.cat === c));
        if (!validCats.length) { alert("No valid sections found."); return; }
        const base = Math.floor(target / validCats.length), rem = target % validCats.length;
        validCats.forEach((cat, i) => {
            let idxs = QUESTION_BANK.map((q, idx) => ({ q, idx })).filter(({ q }) => q.cat === cat).map(({ idx }) => idx);
            for (let j = idxs.length - 1; j > 0; j--) { const k = Math.floor(Math.random() * (j + 1)); [idxs[j], idxs[k]] = [idxs[k], idxs[j]]; }
            selected.push(...idxs.slice(0, base + (i < rem ? 1 : 0)));
        });
        const btn = document.getElementById('generate-btn'); const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Generating...'; btn.classList.add('opacity-70', 'cursor-not-allowed');
        try {
            // MP- prefix for codes
            const code = `MP-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
            const now  = new Date(), exp = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
            await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "mp_access_codes", code), {
                discord, roblox, rbxId, questions: selected, status: 'pending', createdAt: now.toISOString(), expiresAt: exp.toISOString()
            });
            document.getElementById('generated-code-box').classList.remove('hidden');
            document.getElementById('generated-code-display').innerText = code;
            document.getElementById('generated-q-count').innerText = selected.length;
            document.getElementById('admin-discord').value = ''; document.getElementById('admin-roblox').value = ''; document.getElementById('admin-roblox-id').value = '';
        } catch(e) { console.error(e); alert("Failed to generate code."); }
        finally { btn.innerHTML = orig; btn.classList.remove('opacity-70', 'cursor-not-allowed'); }
    }

            const q = window.firebaseCollection(window.firebaseDb, "mp_final_submissions");
            window.firebaseOnSnapshot(q, (querySnapshot) => {
                adminSubmissions = [];
                querySnapshot.forEach(doc => adminSubmissions.push({ id: doc.id, ...doc.data() }));

                renderSubmissionsList();

    }

    function renderSubmissionsList() {
        const listEl = document.getElementById('submissions-list');
        if (!listEl) return;
        const pending = adminSubmissions.filter(s => s.status !== 'graded');
        if (!pending.length) {
            listEl.innerHTML = `<div class="border border-dashed border-emerald-500/30 rounded-xl p-10 flex flex-col items-center justify-center text-center bg-emerald-500/5">
                <i class="fa-solid fa-check-double text-emerald-500 text-4xl mb-3"></i><h4 class="text-white font-bold text-lg mb-1">Inbox Zero</h4>
                <p class="text-[#a1a1aa] text-sm">All candidate exams have been evaluated.</p>
            </div>`;

            return `<div onclick="adminViewDossier('${sub.id}')" class="bg-[#18181b] border border-[#27272a] rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between cursor-pointer hover:border-emerald-500/50 transition-all group">
                <div class="flex items-center mb-3 sm:mb-0">
                    <div class="w-10 h-10 bg-[#09090b] border border-[#27272a] rounded-full flex items-center justify-center text-[#a1a1aa] mr-4 group-hover:text-emerald-500 transition-colors"><i class="fa-solid fa-file-lines text-lg"></i></div>
                    <div><h4 class="font-bold text-white text-sm flex items-center">${sub.roblox} ${alertBadge}</h4>
                    <div class="flex items-center text-[10px] text-[#a1a1aa] mt-1 space-x-3"><span><i class="fa-brands fa-discord mr-1 opacity-70"></i>${sub.discord}</span><span><i class="fa-regular fa-clock mr-1 opacity-70"></i>${date}</span></div></div>
                </div>
                <button class="bg-[#09090b] text-white border border-[#27272a] px-4 py-2 rounded text-xs font-bold group-hover:bg-emerald-600 group-hover:border-emerald-500 transition-colors">
                    ${appState.isGuest ? 'View' : 'Grade'} <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>
            </div>`;
        }).join('');

    function adminViewDossier(docId) {
        currentDossier = adminSubmissions.find(s => s.id === docId);
        if (currentDossier) switchAdminView('dossier_view');
    }

    async function adminSubmitEvaluation(docId, maxPts) {
        let total = 0;
        document.querySelectorAll('.q-score').forEach(inp => total += parseInt(inp.value || 0));
        const pct = (total / maxPts) * 100, passed = pct >= 70;
        const notes = document.getElementById('evaluator-notes')?.value.trim() || "";
        if (!confirm(`Finalize?\nScore: ${total}/${maxPts} (${pct.toFixed(0)}%)\nResult: ${passed ? 'ADMITTED' : 'REJECTED'}`)) return;
        try {
            await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDb, "mp_final_submissions", docId), {
                status: 'graded', score: total, maxScore: maxPts, percentage: pct, passed, notes,
                evaluatedBy: appState.robloxName, evaluatedAt: new Date().toISOString()
            });
            showToast("Exam graded and saved!", "success");
            adminLoadSubmissions();
        } catch(e) { console.error(e); alert("System Error: Could not save evaluation."); }
    }

    function histFilter(f) {
        histCurrentFilter = f;
        ['all', 'graded', 'pending'].forEach(x => {
            const b = document.getElementById('hist-filter-' + x);
            if (b) b.className = x === f ? 'text-xs font-semibold px-4 py-1.5 rounded bg-[#27272a] text-white' : 'text-xs font-semibold px-4 py-1.5 rounded text-[#a1a1aa] hover:text-white';

    function renderHistoryList() {
        const el = document.getElementById('history-list'); if (!el) return;
        let data = allHistoryData;
        if (histCurrentFilter === 'graded')  data = data.filter(s => s.status === 'graded');
        if (histCurrentFilter === 'pending') data = data.filter(s => s.status !== 'graded');
        if (!data.length) { el.innerHTML = '<div class="text-center py-16 text-[#a1a1aa] border border-dashed border-[#27272a] rounded-xl"><p>No records match filter.</p></div>'; return; }
        const isReadOnly = appState.isGuest;
        el.innerHTML = data.map(sub => {
            const isG = sub.status === 'graded';
            const sc  = isG ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' : 'text-amber-400 bg-amber-500/10 border-amber-500/20';
            const flagB = sub.tabSwitches > 0 ? `<span class="bg-red-500/10 text-red-400 px-1.5 py-0.5 rounded border border-red-500/20 ml-2"><i class="fa-solid fa-triangle-exclamation mr-1"></i>${sub.tabSwitches}</span>` : '';
            const resultHtml = isG && sub.score !== undefined ? `<div class="mt-2 text-[10px] font-bold bg-[#09090b] border border-[#27272a] px-2 py-1 rounded inline-block ${sub.passed ? 'text-emerald-400' : 'text-red-400'}">${sub.score}/${sub.maxScore} (${Math.round(sub.percentage)}%) — ${sub.passed ? 'ADMITTED' : 'REJECTED'}</div>` : '';
            return `<div class="bg-[#18181b] border border-[#27272a] rounded-lg p-4 flex flex-col md:flex-row md:items-start justify-between gap-4">
                <div class="flex items-start gap-4">
                    <div class="w-10 h-10 rounded border flex items-center justify-center shrink-0 ${sc} mt-1"><i class="fa-solid ${isG ? 'fa-check-double' : 'fa-clock'}"></i></div>
                    <div>
                        <div class="flex items-center mb-1"><span class="font-bold text-white text-sm">${sub.roblox || 'N/A'}</span><span class="text-[9px] uppercase font-bold px-1.5 py-0.5 rounded border ml-2 ${sc}">${isG ? 'Graded' : 'Pending'}</span>${flagB}</div>
                        <div class="flex flex-wrap gap-x-3 gap-y-1 text-[10px] text-[#a1a1aa] mb-2"><span>${sub.timeTaken || 'N/A'}</span><span>${sub.timestamp ? new Date(sub.timestamp).toLocaleString() : 'N/A'}</span></div>
                        ${resultHtml}
                    </div>
                </div>
                <div class="flex flex-col md:items-end gap-2 shrink-0">
                    <div class="flex items-center gap-2">
                        <button onclick="adminViewDossier('${sub.id}')" class="text-[10px] font-bold px-3 py-1.5 rounded-lg text-white" style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);"><i class="fa-solid fa-${isReadOnly ? 'eye' : 'file-lines'} mr-1"></i> View</button>
                    </div>
                    ${!isReadOnly && appState.isHighCommand ? `<button onclick="deleteInterview('${sub.id}')" class="text-[10px] font-bold px-3 py-1.5 rounded-lg" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);"><i class="fa-solid fa-trash-can text-xs mr-1"></i> Delete</button>` : ''}
                </div>
            </div>`;
        }).join('');
    }
    async function deleteInterview(id) {
        if (!appState.isHighCommand) { showToast('MP COM required.', 'error'); return; }
        if (!confirm('Delete permanently?')) return;
        try {
            await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "mp_final_submissions", id));
            showToast('Record deleted.', 'success');
            allHistoryData = allHistoryData.filter(s => s.id !== id); renderHistoryList();
        } catch(e) { showToast(e.code === 'permission-denied' ? 'Permission denied.' : 'Error deleting.', 'error'); }
    }

    // ── PORTAL SETTINGS ───────────────────────────────────────────────────────
    let currentPortalStatus = true;
    function loadPortalStatus() {
        window.firebaseOnSnapshot(window.firebaseDoc(window.firebaseDb, "mp_settings", "portal"), (snap) => {
            const btn = document.getElementById('portal-toggle-btn');
            currentPortalStatus = snap.exists() ? (snap.data().isOpen !== false) : true;
            if (btn) {
                if (currentPortalStatus) { btn.className = "px-4 py-2 rounded font-bold text-xs bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-500/20"; btn.innerHTML = '<i class="fa-solid fa-unlock mr-2"></i> Portal OPEN'; }
                else { btn.className = "px-4 py-2 rounded font-bold text-xs bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500/20"; btn.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> Portal CLOSED'; }
            }
        });
    }
    async function togglePortalStatus() {
        if (!appState.isHighCommand) { showToast("MP COM required.", "error"); return; }
        if (!confirm(`${!currentPortalStatus ? 'OPEN' : 'CLOSE'} the portal?`)) return;
        try {
            await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "mp_settings", "portal"), { isOpen: !currentPortalStatus }, { merge: true });
            showToast(`Portal is now ${!currentPortalStatus ? 'OPEN' : 'CLOSED'}.`, "success");
        } catch(e) { showToast("Error updating status.", "error"); }
    }

    // ── jrAH+ ─────────────────────────────────────────────────────────────────
    function jrahUpdateQuestion(idx, text) { if (QUESTION_BANK[idx] !== undefined) QUESTION_BANK[idx].q = text; }
    async function jrahSaveAll(show = false) {
        try { await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "mp_admin_data", "question_bank"), { questions: QUESTION_BANK, categories: CATEGORIES }, { merge: true }); if (show) showToast("All changes saved.", "success"); }
        catch(e) { showToast("Error saving.", "error"); }
    }
    function jrahQuickAdd(catIdx, cat) { const inp = document.getElementById(`jrah-quick-add-${catIdx}`); if (!inp) return; const t = inp.value.trim(); if (!t) { showToast("Type a question.", "error"); return; } QUESTION_BANK.push({ cat, q: t }); expandedAdminSections.add(cat); renderAdminUI(); jrahSaveAll(); }
    async function jrahDeleteQuestion(idx) { if (!confirm("Delete?")) return; QUESTION_BANK.splice(idx, 1); renderAdminUI(); await jrahSaveAll(); }
    async function jrahDeleteSection(cat) { if (!confirm(`Delete "${cat}" and all its questions?`)) return; CATEGORIES = CATEGORIES.filter(c => c !== cat); QUESTION_BANK = QUESTION_BANK.filter(q => q.cat !== cat); expandedAdminSections.delete(cat); renderAdminUI(); await jrahSaveAll(); }
    function jrahRenameSectionPrompt(cat) {
        const ov = document.getElementById('jrah-modal-overlay'); if (!ov) return;
        ov.innerHTML = `<div class="bg-[#18181b] border border-[#27272a] rounded-xl shadow-2xl p-6 max-w-sm w-full"><h3 class="font-bold text-white mb-2 text-lg">Rename Category</h3><input type="text" id="jrah-rename-input" value="${cat}" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg px-4 py-2.5 text-sm text-white outline-none mb-5 focus:border-violet-500"><div class="flex gap-3"><button onclick="document.getElementById('jrah-modal-overlay').classList.add('hidden')" class="flex-1 bg-[#09090b] border border-[#27272a] text-white py-2 rounded-lg text-sm">Cancel</button><button onclick="jrahRenameSection('${cat.replace(/'/g,"\\'")}',document.getElementById('jrah-rename-input').value)" class="flex-1 bg-violet-600 text-white py-2 rounded-lg text-sm font-bold">Rename</button></div></div>`;
        ov.classList.remove('hidden');
    }
    async function jrahRenameSection(old, nw) {
        nw = nw.trim(); if (!nw || nw === old) return; if (CATEGORIES.includes(nw)) { showToast("Already exists.", "error"); return; }
        const i = CATEGORIES.indexOf(old); if (i === -1) return;
        CATEGORIES[i] = nw; QUESTION_BANK.forEach(q => { if (q.cat === old) q.cat = nw; });
        if (expandedAdminSections.has(old)) { expandedAdminSections.delete(old); expandedAdminSections.add(nw); }
        document.getElementById('jrah-modal-overlay')?.classList.add('hidden'); renderAdminUI(); await jrahSaveAll(true);
    }
    function jrahOpenAddSection() {
        const ov = document.getElementById('jrah-modal-overlay'); if (!ov) return;
        ov.innerHTML = `<div class="bg-[#18181b] border border-[#27272a] rounded-xl shadow-2xl p-6 max-w-sm w-full"><h3 class="font-bold text-white mb-4 text-lg">New Category</h3><input type="text" id="jrah-new-sec-input" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg px-4 py-2.5 text-sm text-white outline-none mb-5 focus:border-violet-500" placeholder="e.g. MP Procedures"><div class="flex gap-3"><button onclick="document.getElementById('jrah-modal-overlay').classList.add('hidden')" class="flex-1 bg-[#09090b] border border-[#27272a] text-white py-2 rounded-lg text-sm">Cancel</button><button onclick="jrahCreateSection(document.getElementById('jrah-new-sec-input').value)" class="flex-1 bg-violet-600 text-white py-2 rounded-lg text-sm font-bold">Create</button></div></div>`;
        ov.classList.remove('hidden');
    }
    async function jrahCreateSection(name) { name = name.trim(); if (!name) { showToast("Enter a name.", "error"); return; } if (CATEGORIES.includes(name)) { showToast("Already exists.", "error"); return; } CATEGORIES.push(name); expandedAdminSections.add(name); document.getElementById('jrah-modal-overlay')?.classList.add('hidden'); renderAdminUI(); await jrahSaveAll(true); }
    function jrahOpenImport() {
        const ov = document.getElementById('jrah-modal-overlay'); if (!ov) return;
        const opts = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
        ov.innerHTML = `<div class="bg-[#18181b] border border-[#27272a] rounded-xl shadow-2xl p-6 max-w-lg w-full"><h3 class="font-bold text-white mb-2 text-lg">Bulk Import</h3><p class="text-xs text-[#a1a1aa] mb-4">One question per line.</p><select id="jrah-import-cat" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg px-4 py-2.5 text-sm text-white outline-none mb-3">${opts || '<option disabled>Create a category first</option>'}</select><textarea id="jrah-import-text" rows="8" class="w-full bg-[#09090b] border border-[#27272a] rounded-lg px-4 py-2.5 text-sm text-white outline-none resize-none mb-4" placeholder="Paste questions..."></textarea><div class="flex gap-3"><button onclick="document.getElementById('jrah-modal-overlay').classList.add('hidden')" class="flex-1 bg-[#09090b] border border-[#27272a] text-white py-2 rounded-lg text-sm">Cancel</button><button onclick="jrahImportBulk()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-lg text-sm font-bold">Import All</button></div></div>`;
        ov.classList.remove('hidden');
    }
    async function jrahImportBulk() {
        const cat = document.getElementById('jrah-import-cat').value, raw = document.getElementById('jrah-import-text').value;
        if (!cat || !raw.trim()) { showToast("Select section and paste questions.", "error"); return; }
        const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (!lines.length) { showToast("No valid questions.", "error"); return; }
        lines.forEach(q => QUESTION_BANK.push({ cat, q })); expandedAdminSections.add(cat);
        document.getElementById('jrah-modal-overlay')?.classList.add('hidden'); renderAdminUI(); await jrahSaveAll(true);
        showToast(`Imported ${lines.length} questions.`, "success");
    }
    function jrahDragStart(e, idx, cat) { jrahDragSrcIndex = idx; jrahDragSrcCat = cat; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
    function jrahDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
    function jrahDrop(e, tIdx, tCat) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (jrahDragSrcIndex === null || jrahDragSrcIndex === tIdx) return; if (jrahDragSrcCat !== tCat) { showToast("Cannot move between sections.", "error"); return; } const src = QUESTION_BANK.splice(jrahDragSrcIndex, 1)[0]; const nt = tIdx > jrahDragSrcIndex ? tIdx - 1 : tIdx; QUESTION_BANK.splice(nt, 0, src); jrahDragSrcIndex = null; jrahDragSrcCat = null; renderAdminUI(); jrahSaveAll(); }
    function jrahDragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.q-row').forEach(r => r.classList.remove('drag-over')); jrahDragSrcIndex = null; jrahDragSrcCat = null; }

    // ── BOOT ──────────────────────────────────────────────────────────────────
    window.onload = boot;
    </script>
</body>
</html>
