<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MP | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>/* __SERVER_PAYLOAD__ */</script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, setDoc, updateDoc, collection, addDoc, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB5cfzF0ZtshRecPwGPigbVFEkMuGbD0kw",
          authDomain: "mp-website-4de23.firebaseapp.com",
          projectId: "mp-website-4de23",
          storageBucket: "mp-website-4de23.firebasestorage.app",
          messagingSenderId: "985076640347",
          appId: "1:985076640347:web:9170a73ecb4aa8d656ad7e"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        const auth = getAuth(app);

        window.firebaseDb          = db;
        window.firebaseAuth        = auth;
        window.firebaseOnSnapshot  = onSnapshot;
        window.firebaseDoc         = doc;
        window.firebaseGetDoc      = getDoc;
        window.firebaseSetDoc      = setDoc;
        window.firebaseUpdateDoc   = updateDoc;
        window.firebaseCollection  = collection;
        window.firebaseAddDoc      = addDoc;
        window.firebaseSignIn      = signInWithCustomToken;
        window.firebaseQuery       = query;
        window.firebaseOrderBy     = orderBy;
        window.firebaseGetDocs     = getDocs;
        window.firebaseDeleteDoc   = deleteDoc;
        window.firebaseWhere       = where;
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        admin: { bg: '#09090b', surface: '#18181b', border: '#27272a', text: '#e4e4e7', muted: '#a1a1aa' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background: #09090b; color: #e4e4e7; min-height: 100vh; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .admin-scroll::-webkit-scrollbar { width: 6px; }
        .admin-scroll::-webkit-scrollbar-track { background: transparent; }
        .admin-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 6px; }
        .admin-scroll::-webkit-scrollbar-thumb:hover { background: #52525b; }

        #toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(15,23,42,0.95); backdrop-filter: blur(8px); color: white; padding: 12px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideUpFade 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); width: 100%; justify-content: center; }
        .toast-error   { border-color: rgba(239,68,68,0.5);  color: #fca5a5; }
        .toast-success { border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
        .toast-info    { border-color: rgba(59,130,246,0.5); color: #93c5fd; }
        @keyframes slideUpFade { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeOut     { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }

        .rubric-btn { border: 1px solid #3f3f46; border-radius: 8px; width: 36px; height: 36px; font-weight: 700; font-size: 13px; transition: all 0.2s; cursor: pointer; background: #18181b; color: #a1a1aa; }
        .rubric-btn:hover { border-color: #71717a; background: #27272a; color: white; }
        .rubric-btn.selected-0 { background: rgba(239,68,68,0.15);  border-color: #ef4444; color: #fca5a5; box-shadow: 0 0 10px rgba(239,68,68,0.2); }
        .rubric-btn.selected-1 { background: rgba(249,115,22,0.15); border-color: #f97316; color: #fdba74; box-shadow: 0 0 10px rgba(249,115,22,0.2); }
        .rubric-btn.selected-2 { background: rgba(234,179,8,0.15);  border-color: #eab308; color: #fde047; box-shadow: 0 0 10px rgba(234,179,8,0.2); }
        .rubric-btn.selected-3 { background: rgba(34,197,94,0.15);  border-color: #22c55e; color: #86efac; box-shadow: 0 0 10px rgba(34,197,94,0.2); }
        .rubric-btn.selected-4 { background: rgba(59,130,246,0.15); border-color: #3b82f6; color: #93c5fd; box-shadow: 0 0 10px rgba(59,130,246,0.2); }
        .rubric-btn.selected-5 { background: rgba(168,85,247,0.15); border-color: #a855f7; color: #d8b4fe; box-shadow: 0 0 10px rgba(168,85,247,0.2); }

        .drag-handle { cursor: grab; color: #52525b; padding: 4px; transition: color 0.2s; }
        .drag-handle:active { cursor: grabbing; color: #3b82f6; }
        
        #main-panel { display: none; }
        #main-panel.visible { display: flex; }
        #auth-gate { position: fixed; inset: 0; background: #09090b; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        
        .cat-group { transition: all 0.3s ease; }
        .nav-item-active { background: #27272a; color: white; border-right: 3px solid #3b82f6; }

        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-in { animation: slideInRight 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-gate">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-zinc-700 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p id="auth-gate-msg" class="text-zinc-400 text-sm">Verifying secure credentials...</p>
        </div>
    </div>

    <div id="main-panel" class="fixed inset-0 flex flex-col font-sans">
        <!-- Topbar -->
        <div class="h-14 flex items-center justify-between px-6 bg-[#18181b] border-b border-[#27272a] flex-shrink-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-shield-halved text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-sm tracking-wide">Military Police Command</h1>
                    <p class="text-[#a1a1aa] text-[10px] uppercase tracking-widest">Command Center Terminal</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1 rounded bg-[#09090b] border border-[#27272a]">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-xs font-semibold text-emerald-400" id="cc-admin-badge">MPCPT</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-1 rounded bg-[#09090b] border border-[#27272a]">
                    <i class="fa-solid fa-clock text-blue-500 text-xs"></i>
                    <span class="text-xs text-[#a1a1aa]" id="session-timer">02:00:00</span>
                </div>
                <button onclick="secureLogout()" class="w-8 h-8 rounded flex items-center justify-center text-[#a1a1aa] hover:text-white hover:bg-[#27272a] transition-colors" title="Logout">
                    <i class="fa-solid fa-right-from-bracket text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Layout -->
        <div class="flex flex-1 min-h-0">
            <!-- Sidebar -->
            <div class="w-16 sm:w-64 flex-shrink-0 flex flex-col border-r border-[#27272a] bg-[#18181b]/50 overflow-hidden">
                <div id="cc-sidebar-nav" class="flex-1 flex flex-col p-3 gap-1 overflow-y-auto admin-scroll">
                </div>
            </div>

            <!-- Content Area -->
            <div id="admin-dynamic-content" class="flex-1 min-w-0 flex flex-col relative overflow-hidden bg-[#09090b]">
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
    // =========================================================================
    // STATE MANAGEMENT
    // =========================================================================
    let appState = {
        robloxName: null, robloxId: null,
        isAdmin: false, isHighCommand: false, isDeveloper: false,
        tokenExp: null
    };

    let QUESTION_BANK = [];
    let CATEGORIES    = [];
    let adminSubmissions = [];
    let currentDossier = null;
    let adminCurrentView = 'evaluate_list';
    
    let evaluationScores = {};
    let liveAvg = 0.0;

    // NAV — Test Evaluations category first, then Logistics last with db/codes/jrah
    const CC_NAV = [
        { id: 'evaluate_list',     icon: 'fa-file-signature',      label: 'Pending Evals',    color: '#10b981', hcOnly: false, cat: 'Test Evaluations' },
        { id: 'interview_history', icon: 'fa-clock-rotate-left',   label: 'History',          color: '#f43f5e', hcOnly: false, cat: 'Test Evaluations' },
        { id: 'generate',          icon: 'fa-wand-magic-sparkles', label: 'Create Test',      color: '#f59e0b', hcOnly: false, cat: 'Test Evaluations' },
        { id: 'db',                icon: 'fa-database',            label: 'Database',         color: '#3b82f6', hcOnly: false, cat: 'Logistics' },
        { id: 'codes_history',     icon: 'fa-key',                 label: 'Access Codes',     color: '#06b6d4', hcOnly: false, cat: 'Logistics' },
        { id: 'jrah',              icon: 'fa-pen-to-square',       label: 'Bank Editor',      color: '#a855f7', hcOnly: true,  cat: 'Logistics' },
    ];

    async function boot() {
    const p = window.__SERVER_PAYLOAD__ || {};
    if (!p.isAdmin && !p.isHighCommand && !p.isDeveloper) {
        showGateError('Unauthorized access. Access restricted to Command Staff.');
        setTimeout(() => window.location.href = '/', 2000);
        return;
    }
    appState.robloxName    = p.roblox;
    appState.robloxId      = p.id;
    appState.isAdmin       = p.isAdmin;
    appState.isHighCommand = p.isHighCommand;
    appState.isDeveloper   = p.isDeveloper;
    appState.tokenExp      = p.exp;

    if (p.firebaseToken && window.firebaseSignIn) {
        try {
            const userCredential = await window.firebaseSignIn(window.firebaseAuth, p.firebaseToken);
            await userCredential.user.getIdToken(true);
        } catch(e) { console.warn('Firebase login skipped.', e); }
    }

    await loadQuestionBankFromCloud();
    startSessionTimer();
    showAdminPanel();
}

    function showGateError(msg) {
        const el = document.getElementById('auth-gate-msg');
        if(el) { el.textContent = msg; el.style.color = '#f87171'; }
    }

    function showAdminPanel() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-panel').classList.add('visible');
        
        const badge = document.getElementById('cc-admin-badge');
        if (badge) badge.textContent = appState.isHighCommand ? 'MPCOM' : 'MPCPT';

        renderAdminUI();
    }

    function startSessionTimer() {
        if (!appState.tokenExp) return;
        const el = document.getElementById('session-timer');
        const interval = setInterval(() => {
            const now = Math.floor(Date.now() / 1000);
            const diff = appState.tokenExp - now;
            if (diff <= 0) {
                el.textContent = "EXPIRED";
                clearInterval(interval);
                secureLogout();
                return;
            }
            const h = String(Math.floor(diff / 3600)).padStart(2, '0');
            const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            el.textContent = `${h}:${m}:${s}`;
        }, 1000);
    }

    function secureLogout() { window.location.href = '/api/admin-logout'; }

    async function loadQuestionBankFromCloud() {
        try {
            const docRef = window.firebaseDoc(window.firebaseDb, "admin_data", "question_bank");
            const snap = await window.firebaseGetDoc(docRef);
            if (snap.exists()) {
                QUESTION_BANK = snap.data().questions || [];
                CATEGORIES = snap.data().categories || [];
            }
        } catch(e) { console.error('Cloud Bank Load Error:', e); }
    }

    async function saveDBToCloud() {
        try {
            const docRef = window.firebaseDoc(window.firebaseDb, "admin_data", "question_bank");
            await window.firebaseSetDoc(docRef, { questions: QUESTION_BANK, categories: CATEGORIES }, { merge: true });
            showToast("Cloud Database Synchronized", "success");
        } catch(e) { showToast("Sync Failure: Permission Denied", "error"); }
    }

    // =========================================================================
    // UI CORE RENDERING
    // =========================================================================
    function renderAdminUI() {
        const nav = document.getElementById('cc-sidebar-nav');
        const container = document.getElementById('admin-dynamic-content');
        if (!nav || !container) return;

        let currentCat = '';
        nav.innerHTML = CC_NAV.filter(item => !item.hcOnly || appState.isHighCommand).map(item => {
            let catHeader = '';
            if (item.cat !== currentCat) {
                currentCat = item.cat;
                catHeader = `<div class="mt-5 mb-2 px-3"><p class="text-[10px] font-extrabold text-[#52525b] uppercase tracking-[0.15em]">${currentCat}</p></div>`;
            }
            const isActive = adminCurrentView === item.id || (item.id === 'evaluate_list' && adminCurrentView === 'dossier_view');
            return catHeader + `
                <button onclick="switchAdminView('${item.id}')" class="flex flex-col sm:flex-row items-center gap-1 sm:gap-3 px-2 sm:px-4 py-3 sm:py-2.5 rounded-lg transition-all ${isActive ? 'nav-item-active' : 'text-[#a1a1aa] hover:bg-[#27272a]/40 hover:text-white'}">
                    <i class="fa-solid ${item.icon} text-lg sm:text-sm" ${isActive ? `style="color:${item.color}"` : ''}></i>
                    <span class="text-[10px] sm:text-sm font-semibold tracking-tight truncate">${item.label}</span>
                </button>
            `;
        }).join('');

        function renderHeader(icon, color, title, desc) {
            return `
                <div class="px-8 py-6 border-b border-[#27272a] bg-[#18181b]/40 flex items-center justify-between flex-shrink-0">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-xl bg-[#09090b] border border-[#27272a] flex items-center justify-center text-xl" style="color:${color}">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-black text-white tracking-tight">${title}</h2>
                            <p class="text-xs text-[#a1a1aa] font-medium uppercase tracking-widest mt-0.5">${desc}</p>
                        </div>
                    </div>
                </div>`;
        }

        switch (adminCurrentView) {
            case 'evaluate_list': renderEvalList(container, renderHeader); break;
            case 'dossier_view': renderDossier(container); break;
            case 'interview_history': renderHistory(container, renderHeader); break;
            case 'generate': renderGenerate(container, renderHeader); break;
            case 'db': renderDatabase(container, renderHeader); break;
            case 'codes_history': renderCodes(container, renderHeader); break;
            case 'jrah': renderBankEditor(container, renderHeader); break;
            default: container.innerHTML = '<div class="m-auto text-[#3f3f46]">Select a module from the sidebar</div>';
        }
    }

    function switchAdminView(id) {
        adminCurrentView = id;
        renderAdminUI();
    }

    function showToast(msg, type='info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerHTML = `<i class="fa-solid ${type==='error'?'fa-shield-halved':'fa-circle-check'}"></i> ${msg}`;
        c.appendChild(t);
        setTimeout(() => { if(t) t.remove(); }, 3000);
    }

    // =========================================================================
    // VIEW: TEST EVALUATIONS -> PENDING
    // =========================================================================
    function renderEvalList(container, renderHeader) {
        container.innerHTML = renderHeader('fa-file-signature', '#10b981', 'Pending Evaluations', 'Candidate Response Queue');
        const listContainer = document.createElement('div');
        listContainer.className = "flex-1 overflow-y-auto admin-scroll p-8 space-y-4";
        container.appendChild(listContainer);

        const q = window.firebaseQuery(window.firebaseCollection(window.firebaseDb, "final_submissions"), window.firebaseOrderBy("timestamp", "desc"));
        window.firebaseOnSnapshot(q, (snap) => {
            adminSubmissions = [];
            snap.forEach(d => adminSubmissions.push({id: d.id, ...d.data()}));
            const pending = adminSubmissions.filter(s => s.status !== 'graded');
            
            if (pending.length === 0) {
                listContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 text-[#3f3f46] bg-[#18181b]/20 rounded-3xl border-2 border-dashed border-[#27272a]">
                        <i class="fa-solid fa-inbox text-5xl mb-6 opacity-10"></i>
                        <p class="font-bold tracking-widest uppercase text-xs">Clearance Queue Empty</p>
                    </div>`;
                return;
            }

            listContainer.innerHTML = pending.map(sub => `
                <div onclick="openDossier('${sub.id}')" class="bg-[#18181b] border border-[#27272a] rounded-2xl p-5 flex items-center justify-between cursor-pointer hover:border-blue-500/50 hover:bg-[#27272a]/30 transition-all group">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-user-tie"></i>
                        </div>
                        <div>
                            <h4 class="font-black text-white text-base tracking-tight">${sub.roblox}</h4>
                            <div class="flex items-center gap-3 mt-1">
                                <span class="text-[10px] text-[#a1a1aa] font-bold uppercase tracking-widest"><i class="fa-brands fa-discord mr-1"></i> ${sub.discord}</span>
                                <span class="w-1 h-1 rounded-full bg-[#3f3f46]"></span>
                                <span class="text-[10px] text-[#a1a1aa] font-bold uppercase tracking-widest"><i class="fa-solid fa-clock mr-1"></i> ${new Date(sub.timestamp).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black text-amber-500 bg-amber-500/10 px-3 py-1.5 rounded-full uppercase tracking-widest border border-amber-500/20">NEEDS REVIEW</span>
                        <i class="fa-solid fa-chevron-right text-[#3f3f46] group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            `).join('');
        });
    }

    // =========================================================================
    // VIEW: TEST EVALUATIONS -> DOSSIER
    // =========================================================================
    function openDossier(id) {
        currentDossier = adminSubmissions.find(s => s.id === id);
        evaluationScores = {};
        liveAvg = 0.0;
        adminCurrentView = 'dossier_view';
        renderAdminUI();
    }

    function renderDossier(container) {
        if (!currentDossier) return;
        
        container.innerHTML = `
            <div class="flex-1 overflow-hidden flex flex-col bg-[#09090b]">
                <div class="px-8 py-5 border-b border-[#27272a] flex items-center justify-between bg-[#18181b]/60 backdrop-blur-xl z-10">
                    <div class="flex items-center gap-5">
                        <button onclick="switchAdminView('evaluate_list')" class="w-10 h-10 rounded-xl bg-[#27272a] flex items-center justify-center hover:bg-[#3f3f46] transition-colors border border-[#3f3f46]/30">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div>
                            <div class="flex items-center gap-3">
                                <h2 class="text-xl font-black text-white tracking-tighter">${currentDossier.roblox}</h2>
                                <span class="px-2 py-0.5 rounded bg-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-widest border border-blue-500/30">Candidate</span>
                            </div>
                            <p class="text-[10px] text-[#a1a1aa] font-bold uppercase tracking-[0.2em] mt-0.5">${currentDossier.discord} • REF: ${currentDossier.id.slice(-6).toUpperCase()}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-5">
                        <div class="flex flex-col items-end">
                            <p class="text-[9px] font-extrabold text-[#52525b] uppercase tracking-widest">Aggregate Score</p>
                            <div class="text-2xl font-black ${liveAvg >= 3.5 ? 'text-emerald-500' : 'text-red-500'}" id="live-avg-display">0.0</div>
                        </div>
                        <button onclick="finalizeEvaluation()" class="h-11 px-8 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-500/20 transition-all transform active:scale-95">
                            Submit Verdict <i class="fa-solid fa-gavel ml-3"></i>
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto admin-scroll p-8 space-y-12">
                    <div class="max-w-4xl mx-auto space-y-12 pb-20">
                        ${currentDossier.qaList.map((qa, i) => `
                            <div class="animate-slide-in" style="animation-delay: ${i * 0.05}s">
                                <div class="flex items-start gap-6">
                                    <div class="w-8 h-8 rounded-lg bg-[#18181b] border border-[#27272a] flex-shrink-0 flex items-center justify-center text-xs font-black text-[#52525b] mt-1">
                                        ${String(i+1).padStart(2,'0')}
                                    </div>
                                    <div class="flex-1 space-y-4">
                                        <div class="space-y-1">
                                            <p class="text-[10px] font-extrabold text-blue-500 uppercase tracking-widest">${qa.category}</p>
                                            <h4 class="text-base sm:text-lg font-bold text-white leading-relaxed tracking-tight">${qa.question}</h4>
                                        </div>
                                        <div class="relative">
                                            <div class="absolute -left-3 top-0 w-1 h-full bg-blue-600/30 rounded-full"></div>
                                            <div class="bg-[#18181b]/40 border border-[#27272a] p-5 rounded-2xl text-sm text-[#a1a1aa] leading-relaxed whitespace-pre-wrap font-medium">
                                                ${qa.answer}
                                            </div>
                                        </div>
                                        <div class="pt-2 flex flex-wrap items-center gap-3">
                                            <span class="text-[10px] font-black text-[#52525b] uppercase tracking-widest mr-2">Grade Assignment:</span>
                                            <div class="flex gap-2">
                                                ${[0,1,2,3,4,5].map(score => `
                                                    <button onclick="setRubricScore(${i}, ${score})" id="score-${i}-${score}" class="rubric-btn">
                                                        ${score}
                                                    </button>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
    }

    function setRubricScore(qIdx, val) {
        evaluationScores[qIdx] = val;
        for (let i = 0; i <= 5; i++) {
            const btn = document.getElementById(`score-${qIdx}-${i}`);
            if (btn) btn.className = 'rubric-btn';
        }
        const selectedBtn = document.getElementById(`score-${qIdx}-${val}`);
        if(selectedBtn) selectedBtn.classList.add(`selected-${val}`);
        
        const scores = Object.values(evaluationScores);
        liveAvg = (scores.reduce((a, b) => a + b, 0) / currentDossier.qaList.length).toFixed(1);
        const display = document.getElementById('live-avg-display');
        if(display) {
            display.textContent = liveAvg;
            display.className = `text-2xl font-black ${liveAvg >= 3.5 ? 'text-emerald-500' : 'text-red-500'}`;
        }
    }

    async function finalizeEvaluation() {
        const totalExpected = currentDossier.qaList.length;
        if (Object.keys(evaluationScores).length < totalExpected) {
            showToast(`Assessment Incomplete. Grade all ${totalExpected} responses.`, "error");
            return;
        }

        try {
            const verdict = liveAvg >= 3.5 ? 'Passed' : 'Failed';
            
            await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDb, "final_submissions", currentDossier.id), {
                status: 'graded',
                grade: liveAvg,
                gradedBy: appState.robloxName,
                gradedAt: new Date().toISOString(),
                verdict: verdict,
                scores: evaluationScores
            });

            showToast(`Dossier finalized: ${verdict.toUpperCase()}`, "success");
            switchAdminView('evaluate_list');
        } catch(e) { showToast("Critical: Submission to Cloud Failed", "error"); }
    }

    async function issueToken() {

            await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "access_codes", code), {

            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        html2pdf().from(content).set(opt).save();
    }

    // =========================================================================

    </script>
</body>
